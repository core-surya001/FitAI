services:
  # Backend (FastAPI)
  - type: web
    name: fitai-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitai-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://fitai-backend-4ero.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://fit-ai-six-alpha.vercel.app,http://localhost:3000

databases:
  - name: fitai-db
    plan: free
